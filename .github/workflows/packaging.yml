name: Packaging

on: [push, pull_request]

jobs:

  debian:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install python3-build
          sudo apt build-dep .

      - name: Build Debian package
        run: |
          python3 -m build --sdist --no-isolation
          mk-origtargz dist/nicotine-plus-*.tar.gz
          debuild -sa -us -uc

      - name: Prepare artifacts
        run: |
          mkdir build/package/
          cp -Lr ../nicotine_* build/package/

      - name: Archive artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debian-package
          path: build/package/

  flatpak:
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: ubuntu-latest
          - arch: aarch64
            platform: ubuntu-24.04-arm
    runs-on: ${{ matrix.platform }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate manifest
        run: flatpak-builder-lint --exceptions manifest build-aux/flatpak/org.nicotine_plus.Nicotine.json

      - name: Validate appstream
        run: flatpak-builder-lint appstream data/org.nicotine_plus.Nicotine.appdata.xml.in

      - name: Build Flatpak package
        run: |
          flatpak-builder \
            --repo=repo \
            --disable-download \
            --disable-rofiles-fuse \
            --force-clean \
            flatpak_app build-aux/flatpak/org.nicotine_plus.Nicotine.json

          flatpak build-bundle repo \
            org.nicotine_plus.Nicotine-${{ matrix.arch }}.flatpak \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
            org.nicotine_plus.Nicotine

      - name: Archive artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flatpak-${{ matrix.arch }}-package
          path: org.nicotine_plus.Nicotine-${{ matrix.arch }}.flatpak

  snap:
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: ubuntu-latest
          - arch: arm64
            platform: ubuntu-24.04-arm
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Snapcraft
        run: |
          sudo usermod --append --groups lxd "$USER"
          sudo snap install lxd
          sudo lxd init --auto
          sudo iptables -P FORWARD ACCEPT
          sudo snap install --classic snapcraft

      - name: Build Snap package
        run: sudo -u "$USER" -E snapcraft pack

      - name: Install Snap package
        run: sudo snap install --dangerous nicotine-plus_*.snap

      - name: Archive artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snap-${{ matrix.arch }}-package
          path: nicotine-plus_*.snap

  windows:
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - arch: x86_64
            prefix: mingw-w64-clang-x86_64
            msystem: clang64
            platform: windows-latest
          - arch: arm64
            prefix: mingw-w64-clang-aarch64
            msystem: clangarm64
            platform: windows-11-arm
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup msys2
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            ${{ matrix.prefix }}-ca-certificates
            ${{ matrix.prefix }}-gettext-tools
            ${{ matrix.prefix }}-gobject-introspection
            ${{ matrix.prefix }}-gtk4
            ${{ matrix.prefix }}-libadwaita
            ${{ matrix.prefix }}-python-build
            ${{ matrix.prefix }}-python-cx-freeze
            ${{ matrix.prefix }}-python-gobject
            ${{ matrix.prefix }}-python-pycodestyle
            ${{ matrix.prefix }}-python-pylint
            ${{ matrix.prefix }}-python-setuptools
            ${{ matrix.prefix }}-python-wheel
            ${{ matrix.prefix }}-webp-pixbuf-loader

      - name: Install additional dependencies
        run: python3 packaging/windows/dependencies.py

      - name: Freeze application
        run: python3 packaging/windows/setup.py bdist_msi

      - name: Test application startup
        shell: cmd  # Exclude msys2 dependencies
        run: python3 packaging/windows/testrun.py

      - name: Archive installer artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-${{ matrix.arch }}-installer
          path: packaging/windows/build/*.msi

      - name: Archive package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-${{ matrix.arch }}-package
          path: packaging/windows/build/package

  macos:
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: macos-26-intel
          - arch: arm64
            platform: macos-26
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set system language
        run: defaults write NSGlobalDomain AppleLanguages "(en-US)"

      - name: Set up Miniforge
        run: |
          wget "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-$(uname)-$(uname -m).sh"
          bash Miniforge3-$(uname)-$(uname -m).sh -b -p $HOME/miniforge3
          echo "$HOME/miniforge3/bin" >> "$GITHUB_PATH"

      - name: Set up environment
        run: |
          mamba create -n nicotine-plus
          mamba create -n startup-test
          mamba run -n nicotine-plus python3 packaging/macos/dependencies.py

      - name: Freeze application
        run: mamba run -n nicotine-plus python3 packaging/macos/setup.py bdist_dmg

      - name: Test application startup
        run: mamba run -n startup-test python3 packaging/macos/testrun.py

      - name: Archive installer artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-${{ matrix.arch }}-installer
          path: packaging/macos/build/*.dmg
