name: Tests

on: [push, pull_request]

env:
  NICOTINE_NETWORK_TESTS: 1

jobs:

  python:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14',
                 'pypy-3.6', 'pypy-3.10', 'pypy-3.11']
        gtk: [4]
    runs-on: 'ubuntu-24.04'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: setup.py

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install gettext gir1.2-gtk-${{ matrix.gtk }}.0 libcairo2-dev \
            libgirepository1.0-dev libgirepository-2.0-dev libgtk-${{ matrix.gtk }}-bin
          python -m pip install build setuptools wheel .[tests]

      - name: PEP 8 style checks
        run: python -m pycodestyle

      - name: Linting
        run: python -m pylint --recursive=y .

      - name: Integration and unit tests
        run: python -m unittest -v

      - name: Build
        run: python -m build

      - name: Build without isolation
        run: python3 -m build --no-isolation

  ubuntu-debian:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        container: ['debian:bullseye', 'debian:bookworm', 'debian:unstable',
                    'ubuntu:focal', 'ubuntu:jammy', 'ubuntu:noble', 'ubuntu:resolute', 'ubuntu:devel']
    container: ${{ matrix.container }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install autopkgtest dependencies
        run: |
          apt update
          apt -y install autopkgtest

      - name: Run autopkgtest
        run: autopkgtest . -- null

  fedora:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        container: ['fedora:rawhide']
        gtk: [4, 3]
        platform: ['ubuntu-latest', 'ubuntu-24.04-arm']
    runs-on: ${{ matrix.platform }}
    container: ${{ matrix.container }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          dnf -y upgrade --refresh
          dnf -y install gettext gtk${{ matrix.gtk }} python3 python3-build \
            python3-gobject python3-setuptools python3-wheel

      - name: Integration and unit tests
        run: python3 -m unittest -v

      - name: Build
        run: python3 -m build

      - name: Build without isolation
        run: python3 -m build --no-isolation

  opensuse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        container: ['opensuse/tumbleweed']
    container: ${{ matrix.container }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          zypper refresh
          zypper -n install dejavu-fonts gettext-tools python313-build python313-gobject \
            python313-gobject-Gdk python313-setuptools python313-wheel typelib-1_0-Gtk-4_0

      - name: Integration and unit tests
        run: python3.13 -m unittest -v

      - name: Build
        run: python3.13 -m build

      - name: Build without isolation
        run: python3.13 -m build --no-isolation

  netbsd:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Tests
        uses: cross-platform-actions/action@233156312992f3f169d8d0c633c21d12a5d30455 # v1.0.0
        with:
          operating_system: netbsd
          version: '10.1'
          run: |
            sudo pkgin -y install python314

            export NICOTINE_GUI_TESTS=0
            python3.14 -m unittest -v

  dragonflybsd:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Tests
        uses: cross-platform-actions/action@13ec3be3fbdfe52a660fe21c83f332747ed878be
        with:
          operating_system: dragonflybsd
          version: '6.4.2'
          run: |
            sudo pkg install -y dejavu gettext gtk4 python311 py311-build py311-pygobject \
              py311-setuptools py311-wheel

            python3.11 -m unittest -v
            python3.11 -m build
            python3.11 -m build --no-isolation

  midnightbsd:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Tests
        uses: cross-platform-actions/action@13ec3be3fbdfe52a660fe21c83f332747ed878be
        with:
          operating_system: midnightbsd
          version: '4.0.4'
          run: |
            sudo mport index
            sudo mport install dejavu gettext gtk4 python311 py311-build py311-pygobject \
              py311-setuptools py311-wheel || true

            python3.11 -m unittest -v
            python3.11 -m build
            python3.11 -m build --no-isolation

  illumos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Tests
        uses: cross-platform-actions/action@233156312992f3f169d8d0c633c21d12a5d30455 # v1.0.0
        with:
          operating_system: omnios
          version: 'r151056'
          run: |
            BOOTSTRAP_TAR="bootstrap-2025Q4-x86_64.tar.gz"
            curl -O https://pkgsrc.smartos.org/packages/SmartOS/bootstrap/${BOOTSTRAP_TAR}
            sudo tar -zxpf ${BOOTSTRAP_TAR} -C /
            PATH=/opt/local/sbin:/opt/local/bin:$PATH

            sudo pkgin -y update
            sudo pkgin -y upgrade
            sudo pkgin -y install gettext-tools gtk3+ modular-xorg-fonts modular-xorg-server py314-build \
              py314-gobject3 py314-setuptools py314-wheel

            export DISPLAY=:99
            Xvfb :99 > /dev/null 2>&1 &

            python3.14 -m unittest -v
            python3.14 -m build
            python3.14 -m build --no-isolation

  windows:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            prefix: mingw-w64-clang-x86_64
            msystem: clang64
            platform: windows-latest
          - arch: arm64
            prefix: mingw-w64-clang-aarch64
            msystem: clangarm64
            platform: windows-11-arm
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup msys2
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            ${{ matrix.prefix }}-ca-certificates
            ${{ matrix.prefix }}-gettext-tools
            ${{ matrix.prefix }}-gobject-introspection
            ${{ matrix.prefix }}-gtk4
            ${{ matrix.prefix }}-libadwaita
            ${{ matrix.prefix }}-python-build
            ${{ matrix.prefix }}-python-cx-freeze
            ${{ matrix.prefix }}-python-gobject
            ${{ matrix.prefix }}-python-pycodestyle
            ${{ matrix.prefix }}-python-pylint
            ${{ matrix.prefix }}-python-setuptools
            ${{ matrix.prefix }}-python-wheel
            ${{ matrix.prefix }}-webp-pixbuf-loader

      - name: Install additional dependencies
        run: python3 packaging/windows/dependencies.py

      - name: Integration and unit tests
        run: python3 -m unittest -v

      - name: Build
        run: python3 -m build

      - name: Build without isolation
        run: python3 -m build --no-isolation

  macos:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: macos-26-intel
          - arch: arm64
            platform: macos-26
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set system language
        run: defaults write NSGlobalDomain AppleLanguages "(en-US)"

      - name: Set up Miniforge
        run: |
          wget "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-$(uname)-$(uname -m).sh"
          bash Miniforge3-$(uname)-$(uname -m).sh -b -p $HOME/miniforge3
          echo "$HOME/miniforge3/bin" >> "$GITHUB_PATH"

      - name: Set up environment
        run: |
          mamba create -n nicotine-plus
          mamba run -n nicotine-plus python3 packaging/macos/dependencies.py

      - name: Integration and unit tests
        run: mamba run -n nicotine-plus python3 -m unittest -v

      - name: Build
        run: mamba run -n nicotine-plus python3 -m build

      - name: Build without isolation
        run: mamba run -n nicotine-plus python3 -m build --no-isolation
